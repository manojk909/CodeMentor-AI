services:
  - type: web
    name: codementor-ai
    env: python
    buildCommand: "pip install -r render_requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 main:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: codementor-ai-db
          property: connectionString
  - type: pserv
    name: codementor-ai-db
    env: postgresql
    plan: free
    database: codementor_ai
    user: codementor_user
